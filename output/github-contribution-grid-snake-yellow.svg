    <rect class="snake-head" x="50" y="50" width="12" height="12" rx="3">
      <animate attributeName="x" from="50" to="650" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect class="snake-body" x="38" y="50" width="12" height="12" rx="3">
      <animate attributeName="x" from="38" to="638" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect class="snake-body" x="26" y="50" width="12" height="12" rx="3">
      <animate attributeName="x" from="26" to="626" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect class="snake-body" x="14" y="50" width="12" height="12" rx="3">
      <animate attributeName="x" from="14" to="614" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect class="snake-tail" x="2" y="50" width="12" height="12" rx="3">
      <animate attributeName="x" from="2" to="602" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
  
