<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#grad2)"/>
  
  <!-- Decorative circles -->
  <circle cx="700" cy="50" r="80" fill="#FFD700" opacity="0.1"/>
  <circle cx="750" cy="150" r="60" fill="#FFA000" opacity="0.1"/>
  <circle cx="100" cy="150" r="70" fill="#FFD700" opacity="0.05"/>
  
  <!-- Main text -->
  <text x="400" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="url(#grad1)" filter="url(#glow)">namann5</text>
  
  <!-- Subtitle -->
  <text x="400" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="18" text-anchor="middle" fill="#c9d1d9">Backend Engineer • AI Enthusiast • Open Source Contributor</text>
  
  <!-- Decorative line -->
  <line x1="250" y1="140" x2="550" y2="140" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Bottom text -->
  <text x="400" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="14" text-anchor="middle" fill="#8b949e">Building production-grade backend systems with AI integration</text>
</svg>